name = "vayug-edge"
main = "index.js"
compatibility_date = "2024-04-01"

# Bucket Binding
[[r2_buckets]]
binding = "MY_BUCKET"
bucket_name = "snehayog-videos" # Replace with your actual bucket name

# KV Namespace for Caching
[[kv_namespaces]]
binding = "VAYUG_CACHE"
id = "272b4726d4ad49fc9538b96aa116495c" # User will need to create this via `wrangler kv:namespace create SNEHAYOG_CACHE`

[vars]
# API Base URL for your Fly.io/Backend
BACKEND_URL = "https://vayug.fly.dev" 
# JWT Secret should be set using `wrangler secret put JWT_SECRET`
