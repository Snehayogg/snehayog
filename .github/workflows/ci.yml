name: CI

on:
  pull_request:
    branches: [ main, master, develop ]
  push:
    branches: [ main, master, develop ]

jobs:
  test:
    name: Test & Analyze
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🎯 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: 📦 Get dependencies
        working-directory: ./frontend
        run: flutter pub get

      - name: 🔍 Analyze code
        working-directory: ./frontend
        run: |
          # Run analyze and capture output
          set +e
          flutter analyze --no-fatal-infos --no-fatal-warnings 2>&1 | tee analyze-output.txt
          ANALYZE_EXIT=${PIPESTATUS[0]}
          set -e
          
          # Check if there are actual errors (not just warnings/infos)
          # Errors start with "   error •" or "error •"
          if grep -qE "^\s*error •" analyze-output.txt; then
            echo "❌ Analysis found errors - failing build"
            exit 1
          elif [ $ANALYZE_EXIT -ne 0 ]; then
            echo "⚠️  Analysis found warnings/infos only - continuing"
            exit 0
          else
            echo "✅ No analysis issues found"
          fi

      - name: 🧪 Run unit & widget tests
        working-directory: ./frontend
        run: flutter test --coverage

      - name: 🧪 Run integration tests (headless)
        working-directory: ./frontend
        run: |
          # Note: Real integration tests usually require a device/emulator.
          # Here we run it with 'flutter test' which works for some integration tests
          # that don't strictly require a physical device's GPU/OS features.
          flutter test integration_test/upload_video_test.dart

      - name: 📊 Upload coverage
        uses: codecov/codecov-action@v3
        if: always()
        with:
          files: ./frontend/coverage/lcov.info
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: false

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🎯 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: 📦 Get dependencies
        working-directory: ./frontend
        run: flutter pub get

      - name: 🏗️ Build APK (debug)
        working-directory: ./frontend
        run: flutter build apk --debug

      - name: ✅ Build successful
        run: echo "Build check passed!"

